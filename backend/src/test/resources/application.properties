# Test-only overrides. The sweeper's scheduler is off in tests; sweep steps
# are invoked directly so timing is deterministic.
autodispatch.sweeper.enabled=false

# Webhook processing runs on the caller thread in tests (deterministic).
notification.webhook.async=false

# Fake adapter config for tests — placeholder values, not credentials.
whatsapp.mode=STUB
whatsapp.app-secret=test-app-secret
whatsapp.verify-token=test-verify-token
whatsapp.access-token=test-access-token
whatsapp.phone-number-id=000000000000

# Rider JWT secret for tests — placeholder, not a credential.
autodispatch.jwt.secret=test-jwt-secret

# Admin API key for tests — placeholder, not a credential.
autodispatch.admin.api-key=test-admin-key
