# Local development infrastructure only. Credentials below are local-dev
# defaults (matching backend/src/main/resources/application.yml) — not secrets.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autodispatch
      POSTGRES_USER: autodispatch
      POSTGRES_PASSWORD: autodispatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodispatch -d autodispatch"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
