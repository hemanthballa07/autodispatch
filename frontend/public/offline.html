<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — AutoDispatch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; background: #fff; color: #111827;
      text-align: center; padding: 1.5rem;
    }
    .logo { font-size: 1.25rem; font-weight: 700; color: #106344; }
    h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    p  { margin: 0; font-size: 0.9rem; color: #6b7280; }
    button {
      margin-top: 0.5rem; background: #106344; color: #fff;
      border: none; padding: 0.625rem 1.5rem;
      border-radius: 0.5rem; font-size: 0.9375rem; font-weight: 500; cursor: pointer;
    }
    button:hover { background: #0d5238; }
  </style>
</head>
<body>
  <p class="logo">AutoDispatch</p>
  <h1>You're offline</h1>
  <p>Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
